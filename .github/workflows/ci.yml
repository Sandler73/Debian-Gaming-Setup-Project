# ═══════════════════════════════════════════════════════════════════════════════
# Debian Gaming Setup Script — CI/CD Pipeline
# ═══════════════════════════════════════════════════════════════════════════════
#
# SYNOPSIS:
#   Comprehensive GitHub Actions workflow for automated linting, testing,
#   security scanning, performance validation, documentation checks, and
#   release management.
#
# TRIGGERS:
#   - Push to main/develop branches
#   - Pull requests to main
#   - Version tags (v*)
#   - Manual dispatch
#
# JOBS (7):
#   1. lint           — 8 syntax/quality checks (py_compile, bash, patterns,
#                       shell=True, eval/exec, encoding, imports, f-string logging)
#   2. test           — pytest on Python 3.12+3.13 matrix with coverage + JUnit
#   3. security       — Bandit + security tests + secrets scan + URL integrity
#   4. performance    — Load time, parse time, memory, test suite speed
#   5. docs-check     — Essential files, version consistency, wiki cross-links
#   6. quality-gate   — Aggregates all checks, blocks merge on failure
#   7. summary        — Posts results to workflow run summary
#
# NOTE: Release workflow is in .github/workflows/release.yml (triggered by v* tags)
#
# NODE.JS COMPATIBILITY:
#   All actions use v6 (Node.js 24 compatible) to avoid deprecation warnings.
#   See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# VERSION: 3.4.3
# ═══════════════════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
env:
  SCRIPT: debian_gaming_setup.py
  BAD_PATTERNS: "TIMEOUT_API0|GPUType|RoyalHighgrass|DadSchoworseorse"
  PYTHON_DEFAULT: "3.12"

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1: Lint & Syntax Validation (8 checks)
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: "Lint & Syntax (8 checks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      # Check 1: Python syntax compilation
      - name: "[1/8] Python syntax (py_compile)"
        run: python3 -m py_compile ${{ env.SCRIPT }}

      # Check 2: Embedded bash syntax
      - name: "[2/8] Bash syntax (bash -n)"
        run: |
          python3 -c "
          import re
          with open('${{ env.SCRIPT }}', 'r') as f:
              content = f.read()
          match = re.search(r\"r'''(#!/bin/bash.*?)'''\", content, re.DOTALL)
          if match:
              with open('/tmp/launch_game.sh', 'w') as f:
                  f.write(match.group(1))
          else:
              print('ERROR: Could not extract embedded bash script')
              exit(1)
          "
          bash -n /tmp/launch_game.sh

      # Check 3: Anti-hallucination patterns
      - name: "[3/8] Anti-pattern check"
        run: |
          if grep -qE "${{ env.BAD_PATTERNS }}" ${{ env.SCRIPT }}; then
            echo "::error::Hallucinated pattern found!"
            grep -nE "${{ env.BAD_PATTERNS }}" ${{ env.SCRIPT }}
            exit 1
          fi
          echo "✅ No hallucinated patterns"

      # Check 4: No shell=True in subprocess calls (CWE-78)
      - name: "[4/8] No shell=True (CWE-78)"
        run: |
          python3 -c "
          import ast, sys
          with open('${{ env.SCRIPT }}') as f:
              tree = ast.parse(f.read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Call):
                  func = getattr(node, 'func', None)
                  if isinstance(func, ast.Attribute) and func.attr in ('run', 'Popen', 'call', 'check_call', 'check_output'):
                      for kw in node.keywords:
                          if kw.arg == 'shell' and isinstance(kw.value, ast.Constant) and kw.value.value is True:
                              print(f'::error file=${{ env.SCRIPT }},line={node.lineno}::shell=True found')
                              sys.exit(1)
          print('✅ No shell=True in subprocess calls')
          "

      # Check 5: No eval/exec in Python code (CWE-95)
      - name: "[5/8] No eval/exec (CWE-95)"
        run: |
          python3 -c "
          import ast, sys
          with open('${{ env.SCRIPT }}') as f:
              tree = ast.parse(f.read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Call) and isinstance(getattr(node, 'func', None), ast.Name):
                  if node.func.id in ('eval', 'exec'):
                      print(f'::error file=${{ env.SCRIPT }},line={node.lineno}::{node.func.id}() found')
                      sys.exit(1)
          print('✅ No eval/exec in Python code')
          "

      # Check 6: All text-mode open() calls have encoding parameter
      - name: "[6/8] Encoding parameter check"
        run: |
          python3 -c "
          import re, sys
          lines = open('${{ env.SCRIPT }}').readlines()
          pattern = re.compile(r\"open\([^)]+,\s*'[rw]'\s*\)\")
          errors = [(i+1, l.strip()[:70]) for i, l in enumerate(lines)
              if not l.strip().startswith('#') and pattern.search(l) and 'encoding' not in l]
          for n, t in errors:
              print(f'::error file=${{ env.SCRIPT }},line={n}::Missing encoding: {t}')
          sys.exit(1) if errors else print('✅ All open() have encoding')
          "

      # Check 7: No deprecated imports
      - name: "[7/8] Import check"
        run: |
          python3 -c "
          import sys
          source = open('${{ env.SCRIPT }}').read()
          deprecated = ['distutils', 'imp', 'optparse', 'formatter', 'cgi', 'cgitb', 'imghdr', 'sndhdr', 'pipes', 'crypt']
          found = [d for d in deprecated if f'import {d}' in source]
          for d in found:
              print(f'::error::Deprecated import: {d}')
          sys.exit(1) if found else print('✅ No deprecated imports')
          "

      # Check 8: No f-string in logging calls (lazy evaluation bypass)
      - name: "[8/8] No f-string logging"
        run: |
          python3 -c "
          import re, sys
          lines = open('${{ env.SCRIPT }}').readlines()
          count = 0
          for i, line in enumerate(lines):
              stripped = line.strip()
              m = re.match(r'logging\.(info|warning|error|debug|critical)\(', stripped)
              if m:
                  depth = stripped.count('(') - stripped.count(')')
                  j = i + 1
                  while depth > 0 and j < len(lines):
                      depth += lines[j].count('(') - lines[j].count(')')
                      j += 1
                  full = ''.join(lines[i:j])
                  if 'f\"' in full or \"f'\" in full:
                      print(f'::error file=${{ env.SCRIPT }},line={i+1}::f-string in logging call')
                      count += 1
          sys.exit(1) if count else print('✅ No f-string logging calls')
          "

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2: Test Suite (Python version matrix)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: "Tests (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run full test suite with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov/ \
            --junitxml=test-results.xml

      - name: Verify test count (regression guard)
        run: |
          EXPECTED=136
          ACTUAL=$(pytest tests/ --co -q 2>/dev/null | tail -1 | grep -oP '\d+')
          echo "Expected: $EXPECTED tests, Found: $ACTUAL tests"
          if [ "$ACTUAL" -lt "$EXPECTED" ]; then
            echo "::error::Test count regression! Expected $EXPECTED, got $ACTUAL"
            exit 1
          fi
          echo "✅ Test count: $ACTUAL (≥ $EXPECTED)"

      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage HTML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 14

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-py${{ matrix.python-version }}
          path: test-results.xml
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3: Security Scanning
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install security tools
        run: pip install bandit pytest

      # Bandit static analysis with JSON report
      - name: Run Bandit security scan
        run: |
          echo "═══ Bandit Static Security Analysis ═══"
          bandit -r ${{ env.SCRIPT }} \
            -ll \
            --skip B404,B603,B607 \
            -f json -o bandit-report.json || true
          bandit -r ${{ env.SCRIPT }} \
            -ll \
            --skip B404,B603,B607 \
            -f txt || true
          echo ""
          echo "Skipped checks (expected for system tool):"
          echo "  B404: import_subprocess"
          echo "  B603: subprocess_without_shell_equals_true"
          echo "  B607: start_process_with_partial_path"

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

      # Security-focused test suite
      - name: Run security tests (24 tests)
        run: pytest tests/test_security.py -v --tb=short

      # Verify GitHub URL integrity
      - name: Verify repository URL
        run: |
          if grep -q "Sandler73/Debian-Gaming-Setup-Project" ${{ env.SCRIPT }}; then
            echo "✅ Correct repository URL found"
          else
            echo "::error::Repository URL not found in script"
            exit 1
          fi

      # Check for hardcoded secrets
      - name: Check for hardcoded secrets
        run: |
          python3 -c "
          import re, sys
          content = open('${{ env.SCRIPT }}').read()
          patterns = [
              (r'(?i)(password|passwd|secret|api_key)\s*=\s*[\"\\'][^\"\\'][\"\\']', 'Hardcoded credential'),
              (r'ghp_[A-Za-z0-9]{36}', 'GitHub personal access token'),
              (r'AKIA[0-9A-Z]{16}', 'AWS access key'),
              (r'(?i)Bearer\s+[A-Za-z0-9\-._~+/]+=*', 'Bearer token'),
          ]
          found = False
          for pattern, label in patterns:
              for m in re.finditer(pattern, content):
                  line = content[:m.start()].count('\n') + 1
                  print(f'::error file=${{ env.SCRIPT }},line={line}::{label} detected')
                  found = True
          sys.exit(1) if found else print('✅ No hardcoded secrets')
          "

      # Verify all subprocess calls have timeouts
      - name: Verify subprocess timeouts
        run: |
          python3 -c "
          import ast, sys
          with open('${{ env.SCRIPT }}') as f:
              tree = ast.parse(f.read())
          missing = []
          for node in ast.walk(tree):
              if isinstance(node, ast.Call):
                  func = getattr(node, 'func', None)
                  if isinstance(func, ast.Attribute) and isinstance(func.value, ast.Name):
                      if func.value.id == 'subprocess' and func.attr == 'run':
                          if not any(kw.arg == 'timeout' for kw in node.keywords):
                              missing.append(node.lineno)
          for line in missing:
              print(f'::error file=${{ env.SCRIPT }},line={line}::subprocess.run without timeout')
          sys.exit(1) if missing else print('✅ All subprocess.run calls have timeout')
          "

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4: Performance Validation
  # ═══════════════════════════════════════════════════════════════════════════
  performance:
    name: "Performance"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Install dependencies
        run: pip install pytest

      # Script load time
      - name: Measure script load time
        run: |
          python3 -c "
          import time, os, sys, tempfile, importlib.util
          from unittest.mock import patch

          tmp = tempfile.mkdtemp()
          os.makedirs(f'{tmp}/gaming_setup_logs', exist_ok=True)
          os.makedirs(f'{tmp}/gaming_setup_backups', exist_ok=True)

          start = time.perf_counter()
          with patch('os.chown'), \
               patch('os.getuid', return_value=0), \
               patch('os.geteuid', return_value=0), \
               patch.dict(os.environ, {'SUDO_USER': 'test', 'HOME': tmp, 'USER': 'test'}):
              spec = importlib.util.spec_from_file_location('dgs', '${{ env.SCRIPT }}')
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)
          elapsed = time.perf_counter() - start

          print(f'  Load time: {elapsed:.3f}s')
          if elapsed > 5.0:
              print(f'::error::Script load time ({elapsed:.3f}s) exceeds 5s threshold')
              sys.exit(1)
          print(f'  ✅ Within threshold (<5s)')
          "

      # Memory footprint
      - name: Measure memory footprint
        run: |
          python3 -c "
          import os, sys, resource, tempfile, importlib.util
          from unittest.mock import patch

          baseline = resource.getrusage(resource.RUSAGE_SELF).ru_maxrss
          tmp = tempfile.mkdtemp()
          os.makedirs(f'{tmp}/gaming_setup_logs', exist_ok=True)
          os.makedirs(f'{tmp}/gaming_setup_backups', exist_ok=True)

          with patch('os.chown'), \
               patch('os.getuid', return_value=0), \
               patch('os.geteuid', return_value=0), \
               patch.dict(os.environ, {'SUDO_USER': 'test', 'HOME': tmp, 'USER': 'test'}):
              spec = importlib.util.spec_from_file_location('dgs', '${{ env.SCRIPT }}')
              mod = importlib.util.module_from_spec(spec)
              spec.loader.exec_module(mod)

          delta_kb = resource.getrusage(resource.RUSAGE_SELF).ru_maxrss - baseline
          delta_mb = delta_kb / 1024
          print(f'  Memory delta: {delta_kb} KB ({delta_mb:.1f} MB)')
          if delta_mb > 100:
              print(f'::error::Memory footprint ({delta_mb:.1f}MB) exceeds 100MB')
              sys.exit(1)
          print(f'  ✅ Within threshold (<100MB)')
          "

      # Test suite speed
      - name: Measure test suite speed
        run: |
          START=$(date +%s%N)
          pytest tests/ -q --tb=no 2>&1 | tail -1
          END=$(date +%s%N)
          ELAPSED=$(( (END - START) / 1000000 ))
          echo "  Total test time: ${ELAPSED}ms"
          if [ "$ELAPSED" -gt 30000 ]; then
            echo "::warning::Test suite took ${ELAPSED}ms (>30s threshold)"
          else
            echo "  ✅ Within threshold (<30s)"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5: Documentation Validation
  # ═══════════════════════════════════════════════════════════════════════════
  docs-check:
    name: "Documentation"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      # Verify essential files exist
      - name: Check essential files
        run: |
          MISSING=0
          for f in ${{ env.SCRIPT }} LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md \
                   .gitignore Makefile .pre-commit-config.yaml \
                   .github/FUNDING.yml .github/PULL_REQUEST_TEMPLATE.md \
                   .github/workflows/ci.yml \
                   .github/ISSUE_TEMPLATE/config.yml \
                   .github/ISSUE_TEMPLATE/bug_report.yml \
                   .github/ISSUE_TEMPLATE/feature_request.yml \
                   .github/ISSUE_TEMPLATE/security_vulnerability.yml; do
            if [ -f "$f" ]; then
              echo "  ✅ $f"
            else
              echo "  ❌ $f MISSING"
              MISSING=1
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Essential files are missing"
            exit 1
          fi

      # Version consistency
      - name: Check version consistency
        run: |
          SCRIPT_VER=$(grep 'SCRIPT_VERSION = ' ${{ env.SCRIPT }} | head -1 | cut -d'"' -f2)
          echo "  SCRIPT_VERSION: $SCRIPT_VER"
          HEADER_VER=$(head -5 ${{ env.SCRIPT }} | grep -oP 'v\d+\.\d+\.\d+' || echo "NOT_FOUND")
          echo "  Header banner: $HEADER_VER"
          if [ "v$SCRIPT_VER" != "$HEADER_VER" ]; then
            echo "::warning::Header banner ($HEADER_VER) != SCRIPT_VERSION (v$SCRIPT_VER)"
          fi

      # Wiki cross-links
      - name: Check wiki cross-links
        run: |
          if [ -f wiki/_Sidebar.md ]; then
            BROKEN=0
            for link in $(grep -oP '\(([A-Z][A-Za-z-]+)\)' wiki/_Sidebar.md | tr -d '()'); do
              if [ ! -f "wiki/${link}.md" ]; then
                echo "  ❌ Broken: $link"
                BROKEN=1
              fi
            done
            if [ "$BROKEN" -eq 0 ]; then
              echo "  ✅ All wiki sidebar links resolve"
            else
              echo "::error::Broken wiki cross-links"
              exit 1
            fi
          else
            echo "  ⚠ No wiki/_Sidebar.md found"
          fi

      # Project statistics
      - name: Project statistics
        run: |
          echo "═══ Project Statistics ═══"
          echo "  Script:    $(wc -l < ${{ env.SCRIPT }}) lines"
          echo "  Tests:     $(find tests -name 'test_*.py' -exec grep -c 'def test_' {} + 2>/dev/null | awk -F: '{s+=$2}END{print s}') cases"
          echo "  Docs:      $(ls docs/*.md 2>/dev/null | wc -l) files ($(cat docs/*.md 2>/dev/null | wc -l) lines)"
          echo "  Wiki:      $(ls wiki/*.md 2>/dev/null | wc -l) pages ($(cat wiki/*.md 2>/dev/null | wc -l) lines)"
          echo "  Makefile:  $(wc -l < Makefile 2>/dev/null || echo 0) lines"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 6: Quality Gate
  # ═══════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "✅ Quality Gate"
    runs-on: ubuntu-latest
    needs: [lint, test, security, performance, docs-check]
    if: always()
    steps:
      - name: Check all job results
        run: |
          echo "═══ Quality Gate Summary ═══"
          echo ""
          echo "  Lint:        ${{ needs.lint.result }}"
          echo "  Test:        ${{ needs.test.result }}"
          echo "  Security:    ${{ needs.security.result }}"
          echo "  Performance: ${{ needs.performance.result }}"
          echo "  Docs:        ${{ needs.docs-check.result }}"
          echo ""

          # Fail if any required job failed
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ]; then
            echo "::error::Quality gate FAILED — required jobs did not pass"
            exit 1
          fi

          if [ "${{ needs.performance.result }}" != "success" ]; then
            echo "::warning::Performance checks had issues"
          fi
          if [ "${{ needs.docs-check.result }}" != "success" ]; then
            echo "::warning::Documentation checks had issues"
          fi

          echo "✅ Quality gate PASSED"

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 7: Summary (always runs)
  # ═══════════════════════════════════════════════════════════════════════════
  # NOTE: Release workflow is in .github/workflows/release.yml (triggered by v* tags)
  summary:
    name: "📊 Summary"
    runs-on: ubuntu-latest
    needs: [lint, test, security, performance, docs-check, quality-gate]
    if: always()
    steps:
      - name: Pipeline Summary
        run: |
          echo "## CI/CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---:|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint (8 checks) | ${{ needs.lint.result == 'success' && '✅' || '❌' }} ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests (3.12 + 3.13) | ${{ needs.test.result == 'success' && '✅' || '❌' }} ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result == 'success' && '✅' || '❌' }} ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ needs.performance.result == 'success' && '✅' || '⚠️' }} ${{ needs.performance.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs-check.result == 'success' && '✅' || '⚠️' }} ${{ needs.docs-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Quality Gate** | ${{ needs.quality-gate.result == 'success' && '✅ PASSED' || '❌ FAILED' }} |" >> $GITHUB_STEP_SUMMARY
